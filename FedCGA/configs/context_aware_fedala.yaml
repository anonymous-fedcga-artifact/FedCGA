fedala:
  model_type: "transformer"
  model_params:
    mlp:
      input_dim: 19
      hidden_dim: 64
      output_dim: 1
      dropout: 0.2
    residual:
      input_dim: 19
      hidden_dim: 64
      output_dim: 1
      dropout: 0.1
    wide:
      input_dim: 19
      hidden_dim: 128
      output_dim: 1
      dropout: 0.15
    improved_mlp:
      input_dim: 19
      hidden_dims: [ 64, 32 ]
      output_dim: 1
      dropout: 0.1
    transformer:
      input_dim: 19
      d_model: 128
      nhead: 8
      num_layers: 3
      dropout: 0.1
    lstm:
      input_dim: 19
      hidden_size: 16
      num_layers: 1
      dropout: 0.4
      bidirectional: false
  tcn:
      input_dim: 19
      num_channels: [16, 8]
      kernel_size: 3
      dropout: 0.1
  rounds: 15
  local_epochs: 2
  learning_rate: 0.0001
  clients_per_round: 40
  gradient_clip: 1.0
  batch_size: 8
  ala_config:
    batch_size: 32
    rand_percent: 70
    layer_idx: 1
    eta: 1.0
    threshold: 0.1
    num_pre_loss: 10
  context_config:
    enabled: true
    init_strategy: "adaptive"
  context_features:
    data_features:
      sample_count_weight: 0.4
      data_quality_weight: 0.5
    model_features:
      model_complexity_weight: 0.2
      model_type_weight: 0.1
    history_features:
      client_trust_weight: 0.4
      stability_score_weight: 0.3
    state_features:
      training_progress_weight: 0.4
      overfit_risk_weight: 0.3
